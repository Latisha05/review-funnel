<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EESWEB Client Login</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="dashboard-body auth-body">
    <main class="auth-shell">
      <section class="auth-panel">
        <div class="auth-brand">
          <div class="auth-logo-wrap">
            <img src="logo.png" alt="EESWEB logo" class="auth-logo" />
          </div>
          <div>
            <p class="auth-eyebrow">Client Panel</p>
            <h1>EESWEB Dashboard</h1>
            <p class="auth-copy">Sign in to view analytics, reviews, QR performance, and private feedback.</p>
          </div>
        </div>

        <form id="loginForm" class="auth-form">
          <label class="field-group">
            <span>Email address</span>
            <input id="emailInput" type="email" autocomplete="email" required />
          </label>
          <label class="field-group">
            <span>Password</span>
            <input id="passwordInput" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary-button auth-submit" type="submit">Sign in</button>
        </form>

        <button class="auth-link-button" id="forgotPasswordButton" type="button">Forgot password?</button>
        <p class="auth-status" id="authStatus" role="status" aria-live="polite"></p>
      </section>
    </main>
    <script src="auth.js"></script>
  </body>
</html>
