pages_build_output_dir = "."

# All env vars + secrets are managed in the Cloudflare Pages dashboard
# (Project ratify -> Settings -> Environment variables / Functions secrets).
# Do NOT add [vars] or secret values here; they would override dashboard values
# and get baked into every deploy.

# KV binding is preserved (RF_SETTINGS is used by functions/ to read overrides).
[[kv_namespaces]]
binding = "RF_SETTINGS"
id = "e8c0d6b708f046cbaf251010851902cd"
