name = "review-funnel"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

[[kv_namespaces]]
binding = "RF_SETTINGS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
APP_NAME = "Review Funnel"
APP_BUSINESS_NAME = "EESWEB"
APP_BASE_URL = "https://review-funnel.pages.dev"
BUSINESS_ID = "eesweb"
BRANCH_ID = "main"
BRANCH_NAME = "Main"
QR_CODE_ID = "eesweb-test"
QR_CODE_LABEL = "EESWEB Test QR"
GOOGLE_PLACE_ID = "CUylmtiX6yoSEAE"
REVIEW_TOPICS = "Highly Responsive,Clear Communication,Patient & Helpful,Delivered on Time,Transparent Process,Attention to Detail,Exceeded Expectations,Great ROI,Stress-Free Experience"
FEEDBACK_TOPICS = "Ads Performance,Development Delay,Automation Glitch,AI Setup Concern,Support Response,Reporting Update"
AI_TONE = "Enthusiastic"
AI_LENGTH = "medium"
OLLAMA_BASE_URL = "https://NOT_USED_IN_PROD"
OLLAMA_MODEL = "llama3.2:3b"
REVIEW_SYSTEM_PROMPT = "You write realistic customer review suggestions for Google Reviews. Output only one review, with no title, no bullets, no quotes, and no explanation. Sound like a genuine customer, not a marketer. Use simple natural language, specific but believable praise, and avoid overpromising. Avoid repeating the same phrase or idea in the same review. Do not mention AI, generated text, ratings, prompts, business strategy, or internal instructions. Do not use emojis, hashtags, excessive adjectives, or phrases like highly recommended more than once."

# SECRETS — do NOT add here. Set them once via Cloudflare dashboard or:
#   npx wrangler pages secret put FIREBASE_PROJECT_ID
#   npx wrangler pages secret put FIREBASE_CLIENT_EMAIL
#   npx wrangler pages secret put FIREBASE_PRIVATE_KEY
